# Passive-physics baseline (GNS-like): mass-spring cloth draping onto a floor.
# Larger N and 2D connectivity; validates the pipeline scales past a 1D chain.
seq: cloth
seq_kwargs: { nx: 8, ny: 8, T: 260 }

graph: radius
radius: 0.45
max_neighbors: 12
rebuild_graph: true           # contact/large deformation -> connectivity changes

hidden: 128
message_passing_steps: 8

steps: 5000
batch: 4
lr: 1.0e-3
lr_final: 1.0e-4
noise: 5.0e-4
train_frac: 0.7
eval_every: 250
seed: 0
