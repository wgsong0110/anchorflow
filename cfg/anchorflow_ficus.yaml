# ficus wind (SC-GS 80k checkpoint, black bg)
white_bg: false
t2n_views: 4

model:
  n_nodes:   512
  n_frames:  14
  k_gauss:   4
  d_model:   256
  n_layers:  6
  n_heads:   8
  res:       256

train:
  iters:         30000
  n_views:       8
  lr:            1.0e-4
  lambda_arap:   0.01
  lambda_ic:     0.05
  lambda_smooth: 0.01
  k_cond:        16
  vel_scale:     0.05
  w_power:       0.0
  grad_clip:     1.0
  log_every:     50
  ckpt_every:    1000
