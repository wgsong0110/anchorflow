# TRELLIS-generated quadruped (typical_creature_quadruped). transform2origin
# normalises any asset to the same centred unit frame, so the ball camera is a
# reasonable starting point. rotation_degree [0] since TRELLIS already exports Z-up.
preprocessing:
  opacity_threshold: 0.02
  rotation_degree: [0]
  rotation_axis: [0]

camera:
  mpm_space_viewpoint_center: [1.0, 1.0, 1.0]
  mpm_space_vertical_upward_axis: [0, 0, 1]
  default_camera_index: -1
  show_hint: false
  init_azimuthm: -30
  init_elevation: 15
  init_radius: 2.2
  delta_a: 0.0
  delta_e: 0.0
  delta_r: 0.0

train:
  node_num: 512
  latent_dim: 8
  K: 4
  hidden: 128
  mp_steps: 6
  arap_k: 10
  seed: 0
  frames: 14
  render_frames: 30
  max_gaussians: 0        # 0 = use full asset (gradient checkpointing fits 1.18M in 24GB)
  steps: 400
  lr_gnn: 2.0e-4
  lr_anchor: 2.0e-4
  grad_clip: 1.0
  lambda_sds: 1.0e-4
  reg: [1.0, 0.1, 0.01]
  log_every: 20
  ckpt_every: 50

  # --- user-specifiable initial conditions (optional) --------------------- #
  # The rollout seeds from these instead of rest. Coords are in the normalized
  # frame: the object is centred at ~[1,1,1] with roughly unit scale, so a
  # velocity of 0.05 ≈ 5% of the object size per step. Omit `init` for rest start.
  # init:
  #   velocity:   [0.0, 0.0, 0.0]     # global initial velocity (per-step)
  #   pos_offset: [0.0, 0.0, 0.0]     # global initial position offset
  #   learnable:  false               # true -> also optimise these under SDS
  #   regions:                        # per-anchor overrides by bounding box
  #     - box: [0.0, 2.0, 0.0, 2.0, 0.0, 0.6]   # e.g. lower half (legs)
  #       velocity: [0.0, 0.0, 0.05]            # kick legs upward
