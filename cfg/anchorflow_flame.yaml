white_bg: false
t2n_views: 4

model:
  n_nodes:      256
  n_frames:     300      # full N3DV sequence (300 frames @ 30fps)
  hidden:       128
  n_gnn_layers: 4
  mp_steps:     4
  ssm_dim:      128
  z_dim:        8
  e_dim:        8
  k_node:       8
  k_gauss:      4
  dt:           0.1
  accel_scale:  0.01
  res:          540      # higher resolution for T2N reproduction (was 256)

train:
  iters:         50000
  n_views:       1       # MoDGS protocol: cam0 training only
  z0_bank_size:  16
  z0_motion:     0.01
  damping:         0.9
  bptt_window_start: 50   # initial gradient window [a, b], b-a=50
  bptt_window_end:   299  # final window = full sequence (curriculum over training)
  bptt_warmup_frac:  0.8  # reach full window at 80% of iters
  lr_gnn:          1.0e-4
  lr_anchor:       1.0e-3
  lr_z0:           5.0e-4
  lr_gaussian:     0.0
  lambda_rgb:      1.0
  lambda_arap:     0.05
  lambda_z0:       1.0e-5
  grad_clip:       0.5
  log_every:     100
  ckpt_every:    2000

# T2N spline-specific (K keyframes for CubicHermiteTrajectory)
t2n_spline:
  K:             20
  lambda_track:  50.0
  lambda_depth:  0.1
  lambda_mask:   0.5

mds:
  sigma_min:        0.05
  sigma_max:        20.0
  guidance_scale:   3.0
  motion_bucket_id: 127
  w_power:          0.0
  grad_clip:        1.0
