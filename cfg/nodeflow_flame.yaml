white_bg: false

model:
  n_nodes: 512
  n_frames: 21
  hidden: 64
  n_gnn_layers: 3
  k_node: 8
  k_gauss: 4

views:
  n_views: 21
  elevation: 0.0
  radius_scale: 2.5
  fov: 45.0
  res: 576

train:
  iters: 20000
  lr_gnn:    2.0e-3
  lr_traj:   2.0e-2
  lr_init:   1.0e-2
  lambda_ssim:   0.2
  lambda_arap:   0.002
  lambda_smooth: 0.0005
  lambda_init:   0.0
  grad_clip:     1.0
  log_every:     100
  ckpt_every:    2000
