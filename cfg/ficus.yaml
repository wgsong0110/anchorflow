# anchorflow — DreamPhysics/PhysGaussian ficus (static 3DGS canonical + video-SDS).
# Geometry is FIXED (real-multiview-trained 3DGS); only the anchor dynamics are
# learned, distilled from an SVD img2vid motion prior. No MoSca, no node_traj:
# anchors are FPS-sampled from the canonical Gaussians (--node_traj omitted).
preprocessing:
  opacity_threshold: 0.02
  rotation_degree: [0]
  rotation_axis: [0]

# ficus is a PhysGaussian white-bg scene (upward = +z). Camera in the DreamPhysics
# normalized frame; tune azimuth/elevation after the first cond render.
camera:
  mpm_space_viewpoint_center: [1.0, 1.0, 1.0]
  mpm_space_vertical_upward_axis: [0, 0, 1]
  default_camera_index: -1
  show_hint: false
  init_azimuthm: -30
  init_elevation: 0
  init_radius: 2.4
  delta_a: 0.0
  delta_e: 0.0
  delta_r: 0.0

train:
  # anchors / model
  node_num: 512          # FPS anchors sampled from the static canonical Gaussians
  latent_dim: 8          # z_i control latent
  e_dim: 8               # e_i intrinsic identity
  K: 4
  arap_k: 10
  hidden: 128
  mp_steps: 6
  ssm_dim: 128
  accel_scale: 0.1
  dt: 1.0
  damping: 0.9           # velocity friction γ — bounds open-loop autonomous rollout
  stab_bound: 1.0        # a plant sways in place -> keep anchors close to canonical
  lambda_stab: 1.0
  # rollout
  frames: 14             # MDS/SVD render clip
  # stage 1 — supervised: SKIPPED in static mode (no node_traj)
  sup_steps: 0
  # stage 2 — video-SDS (the only training here)
  mds_steps: 2000
  z_jitter: 0.1
  init_vel_std: 0.02     # small per-anchor initial velocity (seeds the sway)
  # optimization
  lr_gnn: 2.0e-4
  lr_anchor: 2.0e-4
  grad_clip: 1.0
  lambda_sds: 1.0e-4
  reg: [1.0, 0.1, 0.01]  # arap, elastic, acc
  log_every: 20
  ckpt_every: 100

  # No IC handles: a potted plant is anchored at the base and sways freely, so we
  # let rest + small random per-anchor velocity + the SDS video prior drive the
  # motion rather than perturbing a hand-picked handle region.
  init:
    handle_pos_std: 0.1
    handle_vel_std: 0.05
