# Coupled second-order dynamics: pinned mass-spring chain swinging under gravity.
# The hard case for spatial coupling — a node's acceleration depends on its
# neighbours' state ("move the shoulder, the hand follows").
seq: pendulum_chain
seq_kwargs: { n: 12, T: 300, dt: 0.02 }

graph: knn
k: 4
rebuild_graph: true          # chain is near-1D; knn on current pose is stable

hidden: 128
message_passing_steps: 6      # >= chain length / 2 so signal reaches both ends

steps: 4000
batch: 8
lr: 1.0e-3
lr_final: 1.0e-4
noise: 3.0e-4                  # random-walk noise -> rollout robustness (GNS)
train_frac: 0.7
eval_every: 250
seed: 0
