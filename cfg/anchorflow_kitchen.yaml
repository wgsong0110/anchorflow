white_bg: false        # official kitchen cfg_args: white_background=False
t2n_views: 4           # views used for tokens_to_nodes

model:
  n_nodes:      256    # target anchor count (tokens_to_nodes compresses to ~this)
  n_frames:     25     # SVD-XT native frame count
  hidden:       128
  n_gnn_layers: 4
  mp_steps:     4      # GNN message-passing steps (SSMDynamics)
  ssm_dim:      128    # per-node SSM hidden dim
  z_dim:        8      # actuation latent (varied per IC)
  e_dim:        8      # anchor identity embedding
  k_node:       8      # anchor graph kNN
  k_gauss:      4      # anchors bound per gaussian (RBF, learnable rho)
  dt:           0.1    # integration step (p+=v*dt, v+=a*dt)
  accel_scale:  0.01   # x scene extent; caps tanh-bounded acceleration
  res:          256    # render LONG side; aspect from official cameras.json

train:
  iters:         30000
  n_views:       8
  z0_bank_size:  16    # initial conditions (z actuation + v0)
  z0_motion:     0.01  # initial node travel per clip, fraction of scene extent
  damping:       1.0   # velocity friction per step (1.0 = none)
  lr_gnn:        1.0e-4
  lr_anchor:     1.0e-3  # anchor rho / node_weight / z / e
  lr_z0:         5.0e-4
  lr_gaussian:   0.0     # >0 optimises gaussian attrs (paper); 0 keeps pretrained
  lambda_rgb:    1.0     # --sup video
  lambda_arap:   0.001
  lambda_z0:     1.0e-5
  grad_clip:     1.0
  log_every:     50
  ckpt_every:    1000

mds:
  sigma_min:        0.05
  sigma_max:        20.0
  guidance_scale:   3.0
  motion_bucket_id: 127
  w_power:          0.0
  grad_clip:        1.0
