white_bg: true

model:
  n_nodes: 256       # K control nodes (FPS-sampled)
  n_frames: 21       # T video frames
  hidden: 64         # GNN hidden dim
  n_gnn_layers: 3    # message passing rounds
  k_node: 8          # k-NN between control nodes
  k_gauss: 4         # k-NN nodes per Gaussian

views:
  n_views: 8
  azimuths: [0, 45, 90, 135, 180, 225, 270, 315]
  elevation: 15.0
  radius_scale: 2.5
  fov: 45.0
  res: 576

train:
  iters: 30000
  lr_gnn:    1.0e-3
  lr_traj:   2.0e-3
  lr_init:   2.0e-3
  lambda_ssim:   0.2
  lambda_arap:   0.05
  lambda_smooth: 0.01
  lambda_init:   1.0e-4   # L2 on init_offset magnitude
  grad_clip:     1.0
  log_every:     100
  ckpt_every:    2000
