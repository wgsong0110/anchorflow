# Self-actuated stand-in: a phase-offset traveling wave along a chain.
# Motion is internally driven (no external force) — the class of object MPM
# cannot represent. Tests whether the GNN propagates a phase relationship.
seq: traveling_wave
seq_kwargs: { n: 16, T: 240 }

graph: knn
k: 4
rebuild_graph: false          # fixed chain topology; motion is transverse

hidden: 128
message_passing_steps: 6

steps: 3000
batch: 8
lr: 1.0e-3
lr_final: 1.0e-4
noise: 3.0e-4
train_frac: 0.7
eval_every: 250
seed: 0
