# ficus wind — physics simulator (mass-spring + SVD MDS)
white_bg: false
t2n_views: 4

sim:
  T:       14       # frames per simulation
  dt:      0.04     # Euler timestep
  K:       6        # spring graph knn degree
  mass:    1.0
  stiffness_init: 10.0
  damping_init:   1.0

train:
  iters:      10000
  n_views:    4
  lr:         1.0e-3
  f_scale:    0.05    # max external force magnitude relative to scene extent
  w_power:    0.0
  grad_clip:  1.0
  log_every:  50
  ckpt_every: 500
  res:        256
