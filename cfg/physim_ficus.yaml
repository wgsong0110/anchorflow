# ficus wind — GNN physics simulator (spatial KNN graph + SVD MDS)
white_bg: false

sim:
  T:            25       # frames per simulation
  grad_steps:   5        # #frames sampled for grad pass (T_grad)
  dt:           0.05     # Euler timestep
  hidden_dim:   256      # GNN hidden / node-enc dimension
  latent_dim:   256      # (unused, kept for compat)
  d_state:      16       # per-node SSM state dimension N
  node_dim:     32       # per-anchor learnable embedding size
  k_nn:         16       # KNN degree (spatial, no object distinction)
  gravity:      0.0      # downward acceleration (−Z axis)
  gravity_axis: 2        # Z-up
  damping:      0.2      # velocity damping per step: v *= (1 - damping)
  k_restore:    0.0      # spring constant pulling back to canonical position
  max_accel:    0.1      # multiplier; actual = max_accel * scene_extent
  impulse_frac: 0.5      # fraction of nodes receiving f_ext impulse (random per step)

train:
  iters:      10000
  n_views:    2
  lr:         3.0e-4
  f_scale:    3.0        # impulse magnitude relative to scene extent
  grad_clip:  1.0
  log_every:  50
  ckpt_every: 500
  res:        256
  lambda_vid: 1.0
  lr_vid:     1.0e-3
