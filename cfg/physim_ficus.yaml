# ficus wind — GNN physics simulator (hierarchical object graph + SVD MDS)
white_bg: false

sim:
  T:            25       # frames per simulation
  grad_steps:   5        # truncated BPTT chunk size (frame t → t-5 only)
  dt:           0.04     # Euler timestep
  hidden_dim:   128      # GNN hidden dimension
  gravity:      2.0      # downward acceleration (−Z axis)
  gravity_axis: 2        # Z-up
  n_objects:    4        # SAM2 cluster count (pot / trunk / branches / leaves)
  k_intra:      12       # KNN degree within same object
  k_inter:      4        # cross-object boundary connections
  sam2_checkpoint: null  # set to path if SAM2 available
  sam2_cfg:      null    # e.g. "sam2.1_hiera_large"

train:
  iters:      10000
  n_views:    4
  lr:         3.0e-4
  f_scale:    0.3        # impulse magnitude relative to scene extent
  grad_clip:  1.0
  log_every:  50
  ckpt_every: 500
  res:        256
