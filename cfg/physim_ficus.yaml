# ficus wind — GNN physics simulator (spatial KNN graph + SVD MDS)
white_bg: false

sim:
  T:            25       # frames per simulation
  grad_steps:   5        # truncated BPTT chunk size
  dt:           0.1      # Euler timestep
  hidden_dim:   256      # GNN hidden dimension
  node_dim:     32       # per-anchor learnable embedding size
  k_nn:         16       # KNN degree (spatial, no object distinction)
  gravity:      5.0      # downward acceleration (−Z axis)
  gravity_axis: 2        # Z-up
  damping:      0.1      # velocity damping per step: v *= (1 - damping)
  k_restore:    2.0      # spring constant pulling back to canonical position
  max_accel:    10.0     # tanh soft-clamp on GNN acceleration output

train:
  iters:      10000
  n_views:    2
  lr:         3.0e-4
  f_scale:    3.0        # impulse magnitude relative to scene extent
  grad_clip:  1.0
  log_every:  50
  ckpt_every: 500
  res:        256
