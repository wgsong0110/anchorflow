name: build-scgs-image

on:
  push:
    branches: [v3]
    paths: ['docker/Dockerfile.scgs', '.github/workflows/image-scgs.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/local/lib/node_modules
          sudo docker image prune -af || true
          df -h
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile.scgs
          push: true
          tags: ghcr.io/wgsong0110/anchorflow-scgs:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
